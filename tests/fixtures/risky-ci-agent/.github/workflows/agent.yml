name: Risky Agent Workflow

on:
  pull_request_target:
    types: [opened, synchronize]

permissions: write-all

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run agent review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python agent.py

